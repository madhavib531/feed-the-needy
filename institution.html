<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Care Institution Dashboard</title>
    <style>
      :root {
        --bg: #f7f9ff;
        --card: #ffffff;
        --text: #1f2a44;
        --muted: #61708d;
        --line: #dbe3ff;
        --brand: #3057f4;
        --brand-soft: #eaf0ff;
        --ok: #147a44;
        --ok-soft: #e6f7ed;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top left, #eef3ff, var(--bg));
        color: var(--text);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding: 18px 20px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--line);
      }

      .topbar h1 { margin: 0; font-size: 30px; }
      .topbar p { margin: 5px 0 0; color: var(--muted); }

      .userbox {
        text-align: right;
      }

      .logout-btn {
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
      }

      .panel h2 { margin: 0 0 12px; font-size: 21px; }

      .summary-box {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: #fafcff;
      }

      .summary-box .label {
        font-size: 12px;
        color: var(--muted);
      }

      .summary-box .value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 700;
      }

      .meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn.refresh {
        width: 100%;
        margin-top: 12px;
        background: var(--brand-soft);
        color: var(--brand);
      }

      .message {
        display: none;
        margin-top: 12px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .message.error { background: #fdecec; color: #b42318; }
      .message.ok { background: var(--ok-soft); color: var(--ok); }

      .cards {
        display: grid;
        gap: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        background: #fff;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .card h3 {
        margin: 0;
        font-size: 18px;
      }

      .card .info {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }

      .status {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .status.pending, .status.assigned, .status.picked-up {
        background: #fff3de;
        color: #ad6708;
      }

      .status.delivered {
        background: var(--ok-soft);
        color: var(--ok);
      }

      .confirm-btn {
        margin-top: 12px;
        background: var(--brand);
        color: #fff;
      }

      .confirm-btn:disabled { opacity: 0.55; cursor: not-allowed; }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 24px;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: flex-start; }
        .userbox { text-align: left; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div>
          <h1>Care Institution Dashboard</h1>
          <p>Track incoming food deliveries and confirm received meals.</p>
        </div>
        <div class="userbox">
          <div id="userName"></div>
          <div id="userRole"></div>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </header>

      <div class="layout">
        <aside class="panel">
          <h2>Summary</h2>
          <div class="summary-box">
            <div class="label">Total Meals Received</div>
            <div class="value" id="totalMeals">0</div>
          </div>
          <div class="meta" id="deliveryCount">0 deliveries</div>
          <button id="refreshBtn" class="btn refresh">Refresh Deliveries</button>
          <div id="errorMsg" class="message error"></div>
          <div id="okMsg" class="message ok"></div>
        </aside>

        <main class="panel">
          <h2>Incoming Deliveries</h2>
          <div id="cards" class="cards"></div>
        </main>
      </div>
    </div>

    <script>
      const API_BASE = 'http://localhost:5000/api';
      const token = localStorage.getItem('authToken');
      const user = JSON.parse(localStorage.getItem('userData') || 'null');
      const userId = user?.id || user?._id || user?.userId || '';
      const cards = document.getElementById('cards');
      const errorMsg = document.getElementById('errorMsg');
      const okMsg = document.getElementById('okMsg');

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        okMsg.style.display = 'none';
      }

      function showOk(message) {
        okMsg.textContent = message;
        okMsg.style.display = 'block';
        errorMsg.style.display = 'none';
      }

      function clearMessages() {
        errorMsg.style.display = 'none';
        okMsg.style.display = 'none';
      }

      if (!token || !user || user.role !== 'institution') {
        window.location.replace('/login');
      }

      document.getElementById('userName').textContent = user.name || 'Institution User';
      document.getElementById('userRole').textContent = user.role || 'institution';

      async function loadIncomingDeliveries() {
        clearMessages();
        cards.innerHTML = '<div class="empty">Loading deliveries...</div>';

        try {
          const response = await fetch(`${API_BASE}/food-request/incoming-deliveries?institutionId=${encodeURIComponent(userId)}`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Failed to load incoming deliveries');
          }

          const deliveries = Array.isArray(data) ? data : [];
          renderDeliveries(deliveries);
        } catch (error) {
          cards.innerHTML = '<div class="empty">No deliveries found.</div>';
          showError(error instanceof Error ? error.message : 'Failed to load incoming deliveries');
        }
      }

      function renderDeliveries(deliveries) {
        const totalMeals = deliveries.reduce((sum, item) => sum + (Number(item.meals) || 0), 0);
        document.getElementById('totalMeals').textContent = String(totalMeals);
        document.getElementById('deliveryCount').textContent = `${deliveries.length} deliveries`;

        if (!deliveries.length) {
          cards.innerHTML = '<div class="empty">No incoming deliveries yet.</div>';
          return;
        }

        cards.innerHTML = deliveries.map((item) => {
          const ngoName = item.assignedNgo || item.assignedNGO || 'NGO';
          const canConfirm = item.status !== 'delivered';

          return `
            <article class="card">
              <div class="card-head">
                <h3>${escapeHtml(String(ngoName))}</h3>
                <span class="status ${escapeHtml(item.status || 'pending')}">${escapeHtml(item.status || 'pending')}</span>
              </div>
              <div class="info">
                Meals Received: ${escapeHtml(String(item.meals ?? 0))}<br />
                Food Type: ${escapeHtml(item.foodType || 'N/A')}<br />
                Delivery Status: ${escapeHtml(item.status || 'pending')}
              </div>
              <button class="btn confirm-btn" data-id="${item._id}" ${canConfirm ? '' : 'disabled'}>Confirm Delivery</button>
            </article>
          `;
        }).join('');
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      cards.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-id]');
        if (!button || button.disabled) return;

        const id = button.dataset.id;

        try {
          button.disabled = true;
          const response = await fetch(`${API_BASE}/food-request/delivery/${id}/confirm`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Failed to confirm delivery');
          }

          showOk('Delivery confirmed successfully.');
          await loadIncomingDeliveries();
        } catch (error) {
          showError(error instanceof Error ? error.message : 'Failed to confirm delivery');
          button.disabled = false;
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', loadIncomingDeliveries);
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('authToken');
        localStorage.removeItem('userData');
        window.location.replace('/login');
      });

      loadIncomingDeliveries();
    </script>
  </body>
</html>
