<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteer Dashboard</title>
    <style>
      :root {
        --bg: #f5f8ff;
        --card: #ffffff;
        --line: #dbe3ff;
        --text: #1f2a44;
        --muted: #5f6c8f;
        --brand: #2f57f2;
        --brand-soft: #e9efff;
        --ok: #1d8a56;
        --ok-soft: #e8f8ee;
        --warn: #b06a16;
        --warn-soft: #fff5e6;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 0 0, #edf2ff, var(--bg));
        color: var(--text);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding: 18px 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--line);
      }

      .header h1 { margin: 0; font-size: 30px; }
      .header p { margin: 4px 0 0; color: var(--muted); }

      .top-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      .logout-btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #101828;
        color: #fff;
        cursor: pointer;
      }

      .layout {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
      }

      .panel h2 { margin: 0 0 14px; font-size: 21px; }

      .profile-grid {
        display: grid;
        gap: 10px;
      }

      .field {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fafcff;
      }

      .field .label { font-size: 12px; color: var(--muted); }
      .field .value { margin-top: 4px; font-weight: 600; }

      .toggle-btn,
      .refresh-btn,
      .action-btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle-btn { width: 100%; margin-top: 12px; background: var(--brand); color: #fff; }
      .refresh-btn { width: 100%; margin-top: 10px; background: var(--brand-soft); color: var(--brand); }

      .message {
        display: none;
        margin-top: 10px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .message.error { background: #fdecec; color: #b42318; }
      .message.ok { background: var(--ok-soft); color: var(--ok); }

      .cards {
        display: grid;
        gap: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        background: #fff;
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .card-title { margin: 0; font-size: 18px; }
      .meta { margin-top: 8px; color: var(--muted); line-height: 1.6; font-size: 14px; }

      .status {
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
      }

      .status.pending, .status.assigned { background: var(--warn-soft); color: var(--warn); }
      .status.picked-up, .status.delivered { background: var(--ok-soft); color: var(--ok); }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .action-btn.start {
        background: var(--brand-soft);
        color: var(--brand);
      }

      .action-btn.complete {
        background: var(--ok-soft);
        color: var(--ok);
      }

      .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 24px;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .header { flex-direction: column; align-items: flex-start; }
        .top-actions { align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div>
          <h1>Volunteer Dashboard</h1>
          <p>Manage availability and track assigned deliveries.</p>
        </div>
        <div class="top-actions">
          <div id="topUserName"></div>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </header>

      <div class="layout">
        <aside class="panel">
          <h2>Profile</h2>
          <div class="profile-grid">
            <div class="field">
              <div class="label">Name</div>
              <div class="value" id="profileName">-</div>
            </div>
            <div class="field">
              <div class="label">Vehicle Type</div>
              <div class="value" id="profileVehicle">N/A</div>
            </div>
            <div class="field">
              <div class="label">Availability</div>
              <div class="value" id="profileStatus">busy</div>
            </div>
          </div>
          <button id="toggleBtn" class="toggle-btn">Set Available</button>
          <button id="refreshBtn" class="refresh-btn">Refresh Deliveries</button>
          <div id="errorMsg" class="message error"></div>
          <div id="okMsg" class="message ok"></div>
        </aside>

        <main class="panel">
          <h2>Assigned Deliveries</h2>
          <div id="deliveryCards" class="cards"></div>
        </main>
      </div>
    </div>

    <script>
      const API_BASE = 'http://localhost:5000/api';
      const token = localStorage.getItem('authToken');
      const user = JSON.parse(localStorage.getItem('userData') || 'null');
      const userId = user?.id || user?._id || user?.userId || '';
      const errorMsg = document.getElementById('errorMsg');
      const okMsg = document.getElementById('okMsg');
      const cards = document.getElementById('deliveryCards');

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        okMsg.style.display = 'none';
      }

      function showOk(message) {
        okMsg.textContent = message;
        okMsg.style.display = 'block';
        errorMsg.style.display = 'none';
      }

      function clearMessages() {
        errorMsg.style.display = 'none';
        okMsg.style.display = 'none';
      }

      if (!token || !user || user.role !== 'volunteer') {
        window.location.replace('/login');
      }

      document.getElementById('topUserName').textContent = user.name || 'Volunteer';

      async function loadProfile() {
        try {
          const response = await fetch(`${API_BASE}/volunteer`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || 'Failed to load profile');
          }

          const profile = Array.isArray(data) && data.length ? data[0] : null;
          document.getElementById('profileName').textContent = profile?.name || user.name || '-';
          document.getElementById('profileVehicle').textContent = profile?.vehicleType || 'N/A';

          const currentAvailability = (profile?.availability || 'busy').toLowerCase();
          document.getElementById('profileStatus').textContent = currentAvailability;
          updateToggleLabel(currentAvailability === 'available');
        } catch (error) {
          showError(error instanceof Error ? error.message : 'Failed to load profile');
        }
      }

      function updateToggleLabel(isAvailable) {
        document.getElementById('toggleBtn').textContent = isAvailable ? 'Set Busy' : 'Set Available';
      }

      async function toggleAvailability() {
        clearMessages();
        const current = document.getElementById('profileStatus').textContent?.toLowerCase() === 'available';
        const nextAvailability = current ? 'busy' : 'available';

        try {
          const response = await fetch(`${API_BASE}/volunteer/status`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              availability: nextAvailability,
              status: nextAvailability === 'available' ? 'active' : 'inactive',
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Failed to update availability');
          }

          document.getElementById('profileStatus').textContent = (data.availability || nextAvailability).toLowerCase();
          updateToggleLabel((data.availability || nextAvailability).toLowerCase() === 'available');
          showOk(`Availability updated to ${(data.availability || nextAvailability).toLowerCase()}.`);
        } catch (error) {
          showError(error instanceof Error ? error.message : 'Failed to update availability');
        }
      }

      async function loadDeliveries() {
        clearMessages();
        cards.innerHTML = '<div class="empty">Loading deliveries...</div>';

        try {
          const response = await fetch(`${API_BASE}/food-request/assigned-deliveries?volunteerId=${encodeURIComponent(userId)}`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Failed to load assigned deliveries');
          }

          renderDeliveries(Array.isArray(data) ? data : []);
        } catch (error) {
          cards.innerHTML = '<div class="empty">No deliveries found.</div>';
          showError(error instanceof Error ? error.message : 'Failed to load assigned deliveries');
        }
      }

      function renderDeliveries(deliveries) {
        if (!deliveries.length) {
          cards.innerHTML = '<div class="empty">No assigned deliveries right now.</div>';
          return;
        }

        cards.innerHTML = deliveries
          .map((item) => {
            const canStart = item.status !== 'picked-up' && item.status !== 'delivered';
            const canComplete = item.status !== 'delivered';
            return `
              <article class="card">
                <div class="card-top">
                  <h3 class="card-title">${escapeHtml(item.donor || 'Donor')}</h3>
                  <span class="status ${escapeHtml(item.status || 'pending')}">${escapeHtml(item.status || 'pending')}</span>
                </div>
                <div class="meta">
                  Pickup Location: ${escapeHtml(item.location || 'N/A')}<br />
                  Drop Location: ${escapeHtml(item.recipient || item.institutionName || 'N/A')}<br />
                  Meals: ${escapeHtml(String(item.meals ?? 0))}
                </div>
                <div class="action-row">
                  <button class="action-btn start" data-action="start" data-id="${item._id}" ${canStart ? '' : 'disabled'}>Start Delivery</button>
                  <button class="action-btn complete" data-action="complete" data-id="${item._id}" ${canComplete ? '' : 'disabled'}>Mark as Completed</button>
                </div>
              </article>
            `;
          })
          .join('');
      }

      async function updateDeliveryStatus(id, status, progress) {
        clearMessages();
        const response = await fetch(`${API_BASE}/food-request/delivery/${id}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status, deliveryProgress: progress }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Failed to update delivery status');
        }

        return data;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      cards.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action][data-id]');
        if (!button || button.disabled) return;

        const id = button.dataset.id;
        const action = button.dataset.action;

        try {
          button.disabled = true;
          if (action === 'start') {
            await updateDeliveryStatus(id, 'picked-up', 'Started delivery');
            showOk('Delivery started.');
          } else {
            await updateDeliveryStatus(id, 'delivered', 'Completed delivery');
            showOk('Delivery marked as completed.');
          }
          await loadDeliveries();
        } catch (error) {
          showError(error instanceof Error ? error.message : 'Failed to update delivery');
          button.disabled = false;
        }
      });

      document.getElementById('toggleBtn').addEventListener('click', toggleAvailability);
      document.getElementById('refreshBtn').addEventListener('click', loadDeliveries);
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('authToken');
        localStorage.removeItem('userData');
        window.location.replace('/login');
      });

      loadProfile();
      loadDeliveries();
    </script>
  </body>
</html>
